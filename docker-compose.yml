# Invoice Agent — full stack: Ollama (LLM) + backend (Ktor/Koog) + frontend (Next.js).
# Service Dockerfiles are wired in a later step; this skeleton fixes the topology,
# networking, and env plumbing.
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Pulls the default model once, then exits. Keeps `ollama` service generic.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-qwen3:4b}"]
    restart: "no"

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
      AGENT_SECRET: ${AGENT_SECRET:-}
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time (browser-reachable URL).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  ollama-models:
